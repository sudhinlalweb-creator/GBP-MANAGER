name: Vercel Preview

on:
  push:
    branches-ignore:
      - main
  workflow_dispatch:
    inputs:
      stage_name:
        description: Optional stage label for this preview deployment
        required: false
        type: string

jobs:
  deploy-preview:
    name: Deploy Preview
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Install frontend dependencies
        run: npm ci

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build preview artifact
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy preview
        id: deploy
        run: |
          DEPLOY_URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "deploy_url=${DEPLOY_URL}" >> "${GITHUB_OUTPUT}"

      - name: Write summary
        run: |
          echo "### Preview Deployment" >> "${GITHUB_STEP_SUMMARY}"
          echo "" >> "${GITHUB_STEP_SUMMARY}"
          echo "- Stage: ${{ github.event.inputs.stage_name || github.ref_name }}" >> "${GITHUB_STEP_SUMMARY}"
          echo "- URL: ${{ steps.deploy.outputs.deploy_url }}" >> "${GITHUB_STEP_SUMMARY}"
